<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="javascript-02.css">
</head>
<body>
    <h1>Calculadora</h1>
    <div>
        <input type="text" id="resultado">
        
        <button id="b7">7</button>
        <button id="b8">8</button>
        <button id="b9">9</button>
        <button id="b-div">/</button>

        <button id="b4">4</button>
        <button id="b5">5</button>
        <button id="b6">6</button>
        <button id="b-mult">*</button>

        <button id="b1">1</button>
        <button id="b2">2</button>
        <button id="b3">3</button>
        <button id="b-res">-</button>

        <button id="b0">0</button>
        <button id="b-punto">.</button>
        <button id="b-ig">=</button>
        <button id="b-sum">+</button>

        <button id="b-ce">CE</button>
    </div>
    <script src="javascript-02.js"></script>
</body>
</html>
